apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: batch
  namespace: cicd
spec:
  project: apps
  source:
    repoURL: https://github.com/GGingGGang/k8s-gitops.git
    targetRevision: main
    path: manifests/batch
  destination:
    server: https://kubernetes.default.svc
    namespace: batch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
