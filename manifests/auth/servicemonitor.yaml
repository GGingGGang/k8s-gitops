apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: auth
  namespace: auth
  labels:
    app.kubernetes.io/name: auth
    release: kps
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: auth
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
