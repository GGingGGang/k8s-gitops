apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: core
  namespace: core
  labels:
    app.kubernetes.io/name: core
    release: kps
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: core
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
