apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch
  namespace: batch
  labels:
    app.kubernetes.io/name: batch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: batch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: batch
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: batch
          image: batch
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0"
            - name: REDIS_ADDR
              value: "redis.data.svc.cluster.local:6379"
            - name: REDIS_DB
              value: "2"
            - name: DB_HOST
              valueFrom:
                secretKeyRef: { name: db-creds, key: host }
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: db-creds, key: username }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: db-creds, key: password }
            - name: DB_NAME
              valueFrom:
                secretKeyRef: { name: db-creds, key: database }
          # JVM 웜업 여유 — startupProbe 로 기동을 감싸고 그 뒤 liveness/readiness 전환
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # 내장 Tomcat 이 기동 시 /tmp 에 작업 디렉토리를 생성 — 읽기전용 루트 유지, /tmp 만 쓰기 허용
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
